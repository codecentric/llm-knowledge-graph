<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offene Fragen – Shop Knowledge Graph</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
  <style>
    :root {
      --color-versand:  #3b82f6;
      --color-glossary: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      color: white;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    header .icon { font-size: 2rem; line-height: 1; }
    header h1   { margin: 0; font-size: 1.4rem; font-weight: 700; }
    header p    { margin: .2rem 0 0; font-size: .82rem; opacity: .7; }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: .75rem;
      padding: .85rem 2rem;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      flex-wrap: wrap;
      align-items: center;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .3rem .8rem;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 700;
      border: 2px solid;
    }
    .stat-chip.total    { background:#fef2f2; color:#991b1b; border-color:#fca5a5; }
    .stat-chip.versand  { background:#eff6ff; color:#1d4ed8; border-color:#93c5fd; }
    .stat-chip.glossary { background:#fffbeb; color:#92400e; border-color:#fcd34d; }
    .stat-chip .dot { width:9px; height:9px; border-radius:50%; background:currentColor; }

    /* Loading */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      gap: 1rem;
      color: #64748b;
    }
    sl-spinner { --indicator-color:#3b82f6; --track-color:#dbeafe; font-size: 2.5rem; }

    /* Main */
    main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

    /* Summary */
    .summary-box {
      background: white;
      border: 1px solid #e2e8f0;
      border-left: 4px solid #ef4444;
      border-radius: 8px;
      padding: .9rem 1.2rem;
      margin-bottom: 1.4rem;
      font-size: .86rem;
      color: #475569;
      line-height: 1.6;
    }
    .summary-box strong { color: #0f172a; }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar label { font-size: .78rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing:.05em; }
    .filter-btn {
      cursor: pointer;
      padding: .3rem .8rem;
      border-radius: 999px;
      border: 2px solid #e2e8f0;
      background: white;
      font-size: .78rem;
      font-weight: 700;
      color: #475569;
      transition: all .12s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #1e293b;
      color: white;
      border-color: #1e293b;
    }

    /* Section headings */
    .section-heading {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin: 1.8rem 0 .8rem;
      font-size: .82rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    /* Issue card */
    .issue-card {
      background: white;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow .15s, transform .15s;
    }
    .issue-card:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,.1);
      transform: translateY(-2px);
    }
    .card-stripe { height: 4px; }
    .stripe-versand  { background: var(--color-versand); }
    .stripe-glossary { background: var(--color-glossary); }

    .card-body { padding: 1rem 1.1rem; flex: 1; }

    .card-meta {
      display: flex;
      gap: .4rem;
      margin-bottom: .5rem;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: .15rem .5rem;
      border-radius: 999px;
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-offen    { background:#fef2f2; color:#b91c1c; }
    .badge-versand  { background:#eff6ff; color:#1e40af; }
    .badge-glossary { background:#fffbeb; color:#92400e; }

    .card-title {
      font-size: .92rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0 0 .45rem;
      line-height: 1.35;
    }
    .card-desc {
      font-size: .83rem;
      color: #475569;
      line-height: 1.55;
      margin: 0 0 .6rem;
    }

    /* Affected tags */
    .affected-list { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .4rem; }
    .affected-tag {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      color: #334155;
      border-radius: 5px;
      padding: .12rem .45rem;
      font-size: .72rem;
      font-weight: 600;
    }

    /* Card footer */
    .card-footer {
      border-top: 1px solid #f1f5f9;
      padding: .55rem 1.1rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      font-size: .73rem;
      color: #94a3b8;
      flex-wrap: wrap;
    }
    .card-footer .meta-item { display: flex; align-items: center; gap: .25rem; }
    .deadline-warn { color: #ef4444 !important; font-weight: 700; }

    /* Empty state */
    .empty { text-align:center; padding: 2rem; color: #94a3b8; font-size: .85rem; }

    /* Error */
    .error-box {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      color: #991b1b;
      font-size: .85rem;
      margin: 1rem 0;
    }
  </style>
</head>
<body>

<header>
  <div class="icon">⚠️</div>
  <div>
    <h1>Offene Fragen – Shop Knowledge Graph</h1>
    <p>Quellen: graph/versand.ttl &amp; graph/glossary.ttl</p>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-chip total">
    <div class="dot"></div>
    <span id="statTotal">–</span>&nbsp;gesamt
  </div>
  <div class="stat-chip versand">
    <div class="dot"></div>
    <span id="statVersand">–</span>&nbsp;Versandlogik
  </div>
  <div class="stat-chip glossary">
    <div class="dot"></div>
    <span id="statGlossary">–</span>&nbsp;Glossar
  </div>
</div>

<div id="loading">
  <sl-spinner></sl-spinner>
  <span>Lade Knowledge Graph …</span>
</div>

<main id="appMain" style="display:none;">
  <div class="summary-box" id="summaryBox"></div>

  <div class="filter-bar">
    <label>Filter:</label>
    <button class="filter-btn active" data-filter="all"      onclick="applyFilter(this)">Alle</button>
    <button class="filter-btn"        data-filter="versand"  onclick="applyFilter(this)">🚚 Versandlogik</button>
    <button class="filter-btn"        data-filter="glossary" onclick="applyFilter(this)">📖 Glossar</button>
  </div>

  <div class="section-heading" id="headingVersand">🚚 Versandlogik – Offene Punkte</div>
  <div class="card-grid" id="gridVersand"></div>

  <div class="section-heading" id="headingGlossary">📖 Glossar – Ungeklärte Definitionen</div>
  <div class="card-grid" id="gridGlossary"></div>
</main>

<script type="module">
import init, { Store } from 'https://cdn.jsdelivr.net/npm/oxigraph@0.3.10/web.js';

// ── TTL-Dateien relativ zur HTML-Datei laden ────────────────────────────────
async function fetchTtl(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`Konnte ${path} nicht laden (HTTP ${res.status})`);
  return res.text();
}

// ── Hilfsfunktionen ─────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function localName(uri) {
  return uri.replace(/.*[#\/]/, '');
}

function slugify(str) {
  return String(str)
    .toLowerCase()
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function extractDeadline(text) {
  const m = text.match(/Deadline:\s*(\d{4}-\d{2}-\d{2})/i);
  return m ? m[1] : null;
}

function extractPersons(text) {
  return ['Thomas', 'Sarah', 'Julia', 'Marco', 'Lena'].filter(n => text.includes(n));
}

function fmtDate(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function isOverdue(iso) {
  return iso && new Date(iso) < new Date();
}

// ── Card-Renderer ────────────────────────────────────────────────────────────
function renderCard({ id, type, title, desc, affected, created, deadline, persons }) {
  const badgeLabel  = type === 'versand' ? '🚚 Versandlogik' : '📖 Glossar';
  const badgeClass  = type;
  const overdue     = isOverdue(deadline);

  const affectedHtml = affected.length
    ? `<div class="affected-list">${affected.map(a => `<span class="affected-tag">📌 ${escHtml(a)}</span>`).join('')}</div>`
    : '';

  const createdHtml  = created  ? `<span class="meta-item">🗓 ${escHtml(fmtDate(created))}</span>` : '';
  const deadlineHtml = deadline
    ? `<span class="meta-item ${overdue ? 'deadline-warn' : ''}">${overdue ? '🔴' : '📅'} Deadline: ${escHtml(fmtDate(deadline))}</span>`
    : '';
  const personsHtml  = persons.length ? `<span class="meta-item">👤 ${escHtml(persons.join(', '))}</span>` : '';

  return `
<div class="issue-card" id="${escHtml(id)}" data-type="${type}">
  <div class="card-stripe stripe-${type}"></div>
  <div class="card-body">
    <div class="card-meta">
      <span class="badge badge-offen">⚠ offen</span>
      <span class="badge badge-${badgeClass}">${badgeLabel}</span>
    </div>
    <div class="card-title">${escHtml(title)}</div>
    <div class="card-desc">${escHtml(desc)}</div>
    ${affectedHtml}
  </div>
  <div class="card-footer">
    ${createdHtml}${deadlineHtml}${personsHtml}
  </div>
</div>`;
}

// ── Haupt-Logik ──────────────────────────────────────────────────────────────
async function run() {
  await init();

  // Beide TTL-Dateien parallel laden
  const [ttlVersand, ttlGlossary] = await Promise.all([
    fetchTtl('../graph/versand.ttl'),
    fetchTtl('../graph/glossary.ttl'),
  ]);

  const store = new Store();
  store.load(ttlVersand,  'text/turtle', 'https://shop.example.org/versand');
  store.load(ttlGlossary, 'text/turtle', 'https://shop.example.org/glossary');

  // ── Query 1: OffenerPunkt-Instanzen ─────────────────────────────────────
  const qOffen = `
    PREFIX versand: <https://shop.example.org/versand#>
    PREFIX rdfs:    <http://www.w3.org/2000/01/rdf-schema#>
    PREFIX dct:     <http://purl.org/dc/terms/>

    SELECT ?op ?label ?comment ?created ?betrifft ?betrifftLabel WHERE {
      ?op a versand:OffenerPunkt ;
          rdfs:label   ?label ;
          rdfs:comment ?comment .
      OPTIONAL { ?op dct:created ?created }
      OPTIONAL {
        ?op versand:betrifft ?betrifft .
        OPTIONAL { ?betrifft rdfs:label ?betrifftLabel }
      }
    }
  `;

  const rowsOffen = [...store.query(qOffen)];

  // Gruppieren nach OP-URI
  const opMap = new Map();
  for (const row of rowsOffen) {
    const uri = row.get('op').value;
    if (!opMap.has(uri)) {
      opMap.set(uri, {
        label:    row.get('label')?.value   ?? localName(uri),
        comment:  row.get('comment')?.value ?? '',
        created:  row.get('created')?.value ?? null,
        affected: [],
      });
    }
    const betrifft = row.get('betrifft');
    if (betrifft) {
      const lbl = row.get('betrifftLabel')?.value ?? localName(betrifft.value);
      const entry = opMap.get(uri);
      if (!entry.affected.includes(lbl)) entry.affected.push(lbl);
    }
  }

  // ── Query 2: Glossar-Konzepte mit offenen Definitionen ─────────────────
  const qGloss = `
    PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

    SELECT ?concept ?label ?definition WHERE {
      ?concept a skos:Concept ;
               skos:prefLabel ?label ;
               skos:definition ?definition .
      FILTER (
        CONTAINS(LCASE(STR(?definition)), 'ungekl') ||
        CONTAINS(LCASE(STR(?definition)), 'noch offen') ||
        CONTAINS(LCASE(STR(?definition)), 'sonderfall noch') ||
        CONTAINS(LCASE(STR(?definition)), 'noch nicht')
      )
    }
  `;

  const glossItems = [...store.query(qGloss)].map(row => ({
    label:      row.get('label')?.value      ?? '',
    definition: row.get('definition')?.value ?? '',
  }));

  // ── Rendern ──────────────────────────────────────────────────────────────
  document.getElementById('loading').style.display = 'none';
  document.getElementById('appMain').style.display  = 'block';

  // Stats
  const vCount = opMap.size;
  const gCount = glossItems.length;
  document.getElementById('statTotal').textContent   = vCount + gCount;
  document.getElementById('statVersand').textContent  = vCount;
  document.getElementById('statGlossary').textContent = gCount;

  // Summary
  document.getElementById('summaryBox').innerHTML =
    `Im Knowledge Graph wurden <strong>${vCount + gCount} offene Punkte</strong> identifiziert: ` +
    `<strong>${vCount}</strong> formell dokumentierte <em>OffenerPunkt</em>-Instanzen in der Versandlogik ` +
    `und <strong>${gCount}</strong> Glossar-Konzepte mit ungeklärten Definitionen.`;

  // Versand-Karten
  const gridV = document.getElementById('gridVersand');
  if (opMap.size === 0) {
    gridV.innerHTML = '<div class="empty">Keine offenen Punkte gefunden.</div>';
  } else {
    gridV.innerHTML = [...opMap.entries()].map(([uri, op]) => renderCard({
      id:       'op-' + slugify(localName(uri)),
      type:     'versand',
      title:    op.label,
      desc:     op.comment,
      affected: op.affected,
      created:  op.created,
      deadline: extractDeadline(op.comment),
      persons:  extractPersons(op.comment),
    })).join('');
  }

  // Glossar-Karten
  const gridG = document.getElementById('gridGlossary');
  if (glossItems.length === 0) {
    gridG.innerHTML = '<div class="empty">Keine ungeklärten Definitionen gefunden.</div>';
  } else {
    gridG.innerHTML = glossItems.map(item => renderCard({
      id:       'op-' + slugify(item.label),
      type:     'glossary',
      title:    item.label,
      desc:     item.definition,
      affected: [],
      created:  null,
      deadline: null,
      persons:  [],
    })).join('');
  }
}

// ── Filter ───────────────────────────────────────────────────────────────────
window.applyFilter = function(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filter = btn.dataset.filter;

  document.querySelectorAll('.issue-card').forEach(card => {
    card.style.display = (filter === 'all' || card.dataset.type === filter) ? '' : 'none';
  });

  ['headingVersand', 'headingGlossary'].forEach(id => {
    const el = document.getElementById(id);
    if (filter === 'all') { el.style.display = ''; return; }
    const isV = id === 'headingVersand';
    el.style.display = (filter === 'versand' && isV) || (filter === 'glossary' && !isV) ? '' : 'none';
  });
};

// ── Start ────────────────────────────────────────────────────────────────────
// ── Hash-Navigation: Karte beim Öffnen per Anker hervorheben ───────────────
function highlightFromHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  const card = document.getElementById(hash);
  if (!card) return;
  requestAnimationFrame(() => {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.style.transition = 'box-shadow .25s, outline .25s';
    card.style.outline = '3px solid #f59e0b';
    card.style.boxShadow = '0 0 0 6px #fde68a';
    setTimeout(() => { card.style.outline = ''; card.style.boxShadow = ''; }, 2600);
  });
}
window.addEventListener('hashchange', highlightFromHash);

run().then(() => highlightFromHash()).catch(err => {
  document.getElementById('loading').innerHTML =
    `<div class="error-box"><strong>Fehler:</strong> ${escHtml(err.message)}<br>
     <small>Bitte die Datei über einen Webserver öffnen (z.&nbsp;B. <code>npm run serve</code> im Workspace-Root).</small></div>`;
});
</script>
</body>
</html>
