name: Validate Knowledge Graph

on:
  push:
    paths:
      - "graph/**"
      - "queries/**"
      - ".agents/skills/sparql-query/scripts/validate.js"
      - ".agents/skills/sparql-query/scripts/validate-shacl.js"
  pull_request:
    paths:
      - "graph/**"
      - "queries/**"
      - ".agents/skills/sparql-query/scripts/validate.js"
      - ".agents/skills/sparql-query/scripts/validate-shacl.js"
  workflow_dispatch:

jobs:
  validate:
    name: Turtle & SPARQL Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install skill dependencies
        run: npm ci
        working-directory: .agents/skills/sparql-query

      - name: Run validation
        run: npm run validate

      - name: Run SHACL validation
        run: npm run validate:shacl
